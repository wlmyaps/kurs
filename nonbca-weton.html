  const argon=await argon2.hash({pass:pbkdf2,salt:s,time:3,mem:65536,hashLen:32,parallelism:1,type:argon2.ArgonType.Argon2id});
  const key=await crypto.subtle.importKey('raw',argon.hash,{name:'AES-GCM'},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  const html=new TextDecoder().decode(plain);
  // tulis halaman asli secara normal
  document.open();document.write(html);document.close();
  setTimeout(()=>{
    // SUNTIK DISABLE-DEVTOOL (library profesional)
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/disable-devtool@0.3.7/disable-devtool.min.js';
    s.setAttribute('disable-devtool-auto', '');
    s.setAttribute('disable-menu', 'true');
    s.setAttribute('clear-log', 'true');
    s.setAttribute('disable-select', 'true');
    s.setAttribute('disable-copy', 'true');
    document.head.appendChild(s);

    // Proteksi tambahan: anti klik kanan & shortcut inspect
    addEventListener('contextmenu', e => e.preventDefault());
    addEventListener('keydown', e => {
      if (e.key === 'F12' ||
         (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
         (e.ctrlKey && ['u','s','p'].includes(e.key.toLowerCase()))) {
        e.preventDefault();
      }
    });

    // HTML2Canvas: ubah simpan halaman jadi gambar statis (anti save asli)
    html2canvas(document.body, { backgroundColor: '#0f172a', useCORS: true, scale: 0.8 }).then(c => {
      const img = c.toDataURL('image/png');
      const fake = '<!DOCTYPE html><html><head><meta charset=UTF-8><title>Snapshot</title></head><body style="margin:0;background:#0f172a;display:flex;justify-content:center;align-items:center;min-height:100vh"><img src="'+img+'" style="max-width:100%"></body></html>';
      const orig = XMLSerializer.prototype.serializeToString;
      XMLSerializer.prototype.serializeToString = function(n) {
        try { if (n === document || n.nodeType === 9) return fake; } catch(e) {}
        return orig.call(this, n);
      };
      addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
          e.preventDefault();
          const a = document.createElement('a');
          a.href = img;
          a.download = 'snapshot.png';
          a.click();
        }
      }, true);
    });
  }, 3000);
 }catch(e){document.getElementById('e').textContent='salah'}}
