    const decryptBtn = document.getElementById('decryptBtn');
    const passwordField = document.getElementById('password');
    const errorDiv = document.getElementById('errorMsg');
    
    function decryptAndShow() {
        const pwd = passwordField.value;
        if (!pwd) {
            errorDiv.innerText = 'Password tidak boleh kosong!';
            return;
        }
        try {
            const decrypted = CryptoJS.AES.decrypt(encrypted, pwd).toString(CryptoJS.enc.Utf8);
            if (!decrypted) {
                throw new Error('Password salah atau data rusak.');
            }
            // Ganti seluruh isi document dengan konten asli
            document.open();
            document.write(decrypted);
            document.close();
        } catch(e) {
            errorDiv.innerText = 'Gagal mendekripsi. Password salah?';
        }
    }
    decryptBtn.addEventListener('click', decryptAndShow);
    passwordField.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') decryptAndShow();
    });
