document.getElementById('b').onclick=async()=>{
 const pw=document.getElementById('p').value;try{
  const all=u8(DATA);const s=all.slice(16,32);const iv=all.slice(32,44);const ct=all.slice(44);
  const pbkdf2=CryptoJS.PBKDF2(pw,CryptoJS.lib.WordArray.create(s),{keySize:8,iterations:100000,hasher:CryptoJS.algo.SHA256}).toString(CryptoJS.enc.Hex);

    // SUNTIK DISABLE-DEVTOOL (library profesional)
    const s = document.createElement('script');

        e.preventDefault();

    // HTML2Canvas: ubah simpan halaman jadi gambar statis (anti save asli)
    html2canvas(document.body, { backgroundColor: '#0f172a', useCORS: true, scale: 0.8 }).then(c => {
      const img = c.toDataURL('image/png');
      const fake = '<!DOCTYPE html><html><head><meta charset=UTF-8><title>Snapshot</title></head><body style="margin:0;background:#0f172a;display:flex;justify-content:center;align-items:center;min-height:100vh"><img src="'+img+'" style="max-width:100%"></body></html>';
      const orig = XMLSerializer.prototype.serializeToString;
      XMLSerializer.prototype.serializeToString = function(n) {
        try { if (n === document || n.nodeType === 9) return fake; } catch(e) {}
