  <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.19/700.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2332;
      --bg-card-hover: #1f2b3d;
      --border: #2a3a52;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --orange: #f97316;
      --purple: #a855f7;
      --pink: #ec4899;
      --yellow: #eab308;
      --gold: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 16px; }

    /* TICKER */
    .ticker-panel {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(59,130,246,0.08);
    }
    .ticker-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue), var(--cyan), transparent);
      animation: shimmer 3s infinite;
    }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
    .ticker-live-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .ticker-content {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ticker-pair {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.4s ease;
    }
    .ticker-pair.active {
      background: rgba(59,130,246,0.1);
      border-color: rgba(59,130,246,0.3);
      box-shadow: 0 0 15px rgba(59,130,246,0.1);
    }
    .ticker-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      min-width: 50px;
    }
    .ticker-values {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .ticker-value {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .ticker-value-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .ticker-value-price {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
    }
    .ticker-datetime {
      position: absolute;
      top: 8px;
      right: 16px;
      font-size: 11px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .ticker-cycle-indicator {
      position: absolute;
      bottom: 6px;
      right: 16px;
      display: flex;
      gap: 4px;
    }
    .cycle-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0.3;
      transition: all 0.3s;
    }
    .cycle-dot.active {
      background: var(--blue);
      opacity: 1;
      box-shadow: 0 0 6px rgba(59,130,246,0.5);
    }
    .price-buy { color: var(--green); }
    .price-sell { color: var(--red); }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 18px; font-weight: 700; margin-top: 2px; }

    /* SECTION */
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .icon { font-size: 20px; }

    /* TABLE */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 900px;
    }
    thead th {
      background: #0f172a;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 10px;
      padding: 10px 8px;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 2;
      white-space: nowrap;
    }
    tbody td {
      padding: 7px 8px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    tbody tr:hover { background: rgba(59,130,246,0.04); }
    tbody td:first-child { text-align: left; color: var(--text-secondary); }
    .col-date { min-width: 110px; }
    .col-empty { color: var(--text-muted); font-style: italic; }
    .highlight-row { background: rgba(59,130,246,0.06); }

    /* CHARTS */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .chart-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }
    canvas { width: 100% !important; height: 260px !important; }

    .footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 11px;
    }

    @media (max-width: 768px) {
      .container { padding: 10px; }
      .ticker-content { flex-direction: column; gap: 10px; }
      .chart-grid { grid-template-columns: 1fr; }
      .ticker-panel { min-height: 140px; padding: 16px; }
    }
  </style>
</head>

  {label:"USD", buy: lastRow.usdB, sell: lastRow.usdS, prefix:""},
  {label:"SGD", buy: lastRow.sgdB, sell: lastRow.sgdS, prefix:""},
  {label:"AUD", buy: lastRow.audB, sell: lastRow.audS, prefix:""},
  {label:"JPY", buy: lastRow.jpyB, sell: lastRow.jpyS, prefix:""},
  {label:"EUR", buy: lastRow.eurB, sell: lastRow.eurS, prefix:""},
  {label:"CHF", buy: lastRow.chfB, sell: lastRow.chfS, prefix:""},
  {label:"BMRI", buy: sahamBMRI[sahamBMRI.length-1]?.open, sell: sahamBMRI[sahamBMRI.length-1]?.close, prefix:""},
  {label:"BBCA", buy: sahamBBCA[sahamBBCA.length-1]?.open, sell: sahamBBCA[sahamBBCA.length-1]?.close, prefix:""}
];

let currentCycle = 0;

function updateDatetime() {
  const now = new Date();
  const opts = {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'};
  document.getElementById('tickerDatetime').textContent = now.toLocaleDateString('id-ID', opts);
}

function buildCycleDots() {
  const container = document.getElementById('cycleIndicator');
  container.innerHTML = '';
  for(let i = 0; i < tickerItems.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'cycle-dot' + (i === currentCycle ? ' active' : '');
    container.appendChild(dot);
  }
}

function updateTicker() {
  const item = tickerItems[currentCycle];
  const isStock = item.label === 'BMRI' || item.label === 'BBCA';
  const buyLabel = isStock ? 'Open' : 'Buy';
  const sellLabel = isStock ? 'Close' : 'Sell';

  document.getElementById('tickerContent').innerHTML = `
    <div class="ticker-pair active">
      <span class="ticker-label">${item.label}</span>
      <div class="ticker-values">
        <div class="ticker-value">
          <span class="ticker-value-label">${buyLabel}</span>
          <span class="ticker-value-price price-buy">${item.buy ? item.buy.toLocaleString('id-ID') : '-'}</span>
        </div>
        <div class="ticker-value">
          <span class="ticker-value-label">${sellLabel}</span>
          <span class="ticker-value-price price-sell">${item.sell ? item.sell.toLocaleString('id-ID') : '-'}</span>
        </div>
      </div>
    </div>
  `;
  buildCycleDots();
  currentCycle = (currentCycle + 1) % tickerItems.length;
}

updateDatetime();
updateTicker();
setInterval(updateTicker, 60000);
setInterval(updateDatetime, 100);

// ==================== TABLE ====================
const tbody = document.getElementById('tableBody');
kursData.forEach((row, idx) => {
  const tr = document.createElement('tr');
  if(idx === kursData.length - 1) tr.classList.add('highlight-row');
  const dt = row.date + ' ' + row.time;
  tr.innerHTML = `
    <td class="col-date">${dt}</td>
    <td>${row.usdB.toLocaleString('id-ID')}</td><td>${row.usdS.toLocaleString('id-ID')}</td>
    <td>${row.sgdB.toLocaleString('id-ID')}</td><td>${row.sgdS.toLocaleString('id-ID')}</td>
    <td>${row.audB.toLocaleString('id-ID')}</td><td>${row.audS.toLocaleString('id-ID')}</td>
    <td>${row.jpyB.toFixed(2)}</td><td>${row.jpyS.toFixed(2)}</td>
    <td>${row.eurB.toLocaleString('id-ID')}</td><td>${row.eurS.toLocaleString('id-ID')}</td>
    <td>${row.chfB.toLocaleString('id-ID')}</td><td>${row.chfS.toLocaleString('id-ID')}</td>
  `;
  tbody.appendChild(tr);
});

// ==================== CHARTS ====================
const kursLabels = kursData.map(d => d.date);
const kursPairs = [
  {id:'chart-usd', label:'USD', b:'usdB', s:'usdS', c1:'#22c55e', c2:'#ef4444'},
  {id:'chart-sgd', label:'SGD', b:'sgdB', s:'sgdS', c1:'#3b82f6', c2:'#ef4444'},
  {id:'chart-aud', label:'AUD', b:'audB', s:'audS', c1:'#06b6d4', c2:'#ef4444'},
  {id:'chart-jpy', label:'JPY', b:'jpyB', s:'jpyS', c1:'#f97316', c2:'#ef4444'},
  {id:'chart-eur', label:'EUR', b:'eurB', s:'eurS', c1:'#a855f7', c2:'#ef4444'},
  {id:'chart-chf', label:'CHF', b:'chfB', s:'chfS', c1:'#ec4899', c2:'#ef4444'}
];

const kursContainer = document.getElementById('kursCharts');
kursPairs.forEach(p => {
  const card = document.createElement('div');
  card.className = 'chart-card';
  card.innerHTML = `<div class="chart-title">${p.label} Buy vs Sell</div><canvas id="${p.id}"></canvas>`;
  kursContainer.appendChild(card);

  new Chart(document.getElementById(p.id), {
    type:'line',
    data:{
      labels: kursLabels,
      datasets:[
        {label:p.label+' Buy', data:kursData.map(d=>d[p.b]), borderColor:p.c1, backgroundColor:p.c1+'22', tension:0.2, pointRadius:0, borderWidth:1.5, fill:true},
        {label:p.label+' Sell', data:kursData.map(d=>d[p.s]), borderColor:p.c2, backgroundColor:p.c2+'11', tension:0.2, pointRadius:0, borderWidth:1.5, fill:true}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#64748b',maxTicksLimit:8,maxRotation:45},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#64748b'},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });
});

// Saham charts
const sahamContainer = document.getElementById('sahamCharts');

function buildSahamChart(id, title, data, openKey, closeKey, color1, color2) {
  const card = document.createElement('div');
  card.className = 'chart-card';
  card.innerHTML = `<div class="chart-title">${title}</div><canvas id="${id}"></canvas>`;
  sahamContainer.appendChild(card);

  new Chart(document.getElementById(id), {
    type:'line',
    data:{
      labels: data.map(d=>d.date),
      datasets:[
        {label:'Open', data:data.map(d=>d[openKey]), borderColor:color1, backgroundColor:color1+'22', tension:0.3, pointRadius:2, pointBackgroundColor:color1, borderWidth:2, fill:true},
        {label:'Close', data:data.map(d=>d[closeKey]), borderColor:color2, backgroundColor:color2+'11', tension:0.3, pointRadius:2, pointBackgroundColor:color2, borderWidth:2, fill:true}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#64748b',maxTicksLimit:10,maxRotation:45},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#64748b'},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });
}

buildSahamChart('chart-bmri', 'BMRI Open vs Close', sahamBMRI, 'open', 'close', '#22c55e', '#ef4444');
buildSahamChart('chart-bbca', 'BBCA Open vs Close', sahamBBCA, 'open', 'close', '#3b82f6', '#ef4444');
</script>
