<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs Tracker Pro - Full Period</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .chart-container { position: relative; height: 65vh; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Visualisasi Kurs Lengkap ðŸ“ˆ</h1>
                <p class="text-slate-500">Periode: 19 April 2025 â€“ 13 April 2026</p>
            </div>
            <div class="flex gap-2">
                <select id="currencySelect" class="bg-white border border-slate-200 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm font-semibold">
                    <option value="usd">USD (US Dollar)</option>
                    <option value="sgd">SGD (Singapore Dollar)</option>
                    <option value="aud">AUD (Australian Dollar)</option>
                    <option value="jpy">JPY (Japanese Yen)</option>
                    <option value="eur">EUR (Euro)</option>
                    <option value="chf">CHF (Swiss Franc)</option>
                </select>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-slate-500 mb-1">Harga Beli Terakhir (13 Apr 2026)</p>
                <h3 id="lastBuy" class="text-2xl font-bold text-indigo-600">-</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-slate-500 mb-1">Harga Jual Terakhir (13 Apr 2026)</p>
                <h3 id="lastSell" class="text-2xl font-bold text-rose-500">-</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-slate-500 mb-1">Total Data Poin</p>
                <h3 id="dataCount" class="text-2xl font-bold text-slate-700">-</h3>
            </div>
        </div>

        <!-- Main Chart -->
        <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100">
            <div class="chart-container">
                <canvas id="kursChart"></canvas>
            </div>
        </div>

        <div class="mt-8 flex flex-col items-center gap-2 text-slate-400 text-sm">
            <span>âœ¨ Data disambung dari 19 Apr 2025 ke 13 Apr 2026 âœ¨</span>
            <span class="opacity-50 text-xs">Scroll/Zoom untuk melihat detail harian</span>
        </div>
    </div>

    <script>
        // Data LENGKAP dari CSV kamu (April 2025 - April 2026)
        const rawData = `date,usd buy,usd sell,sgd buy,sgd sell,time,aud buy,aud sell,jpy buy,jpy sell,eur buy,eur sell,chf buy,chf sell
2025-04-19,16820,16875,12819,12879,16:53:00,10709,10775,118.24,118.75,19147,19238,20585,20695
2025-04-21,16790,16820,12878,12919,20:12:00,10781,10835,119.14,119.48,19350,19409,20831,20922
2025-04-22,16840,16870,12855,12896,22:20:00,10747,10799,119.53,119.88,19315,19376,20672,20760
2025-04-23,16870,16890,12844,12877,12:56:00,10768,10820,119.34,119.64,19290,19342,20674,20750
2025-05-01,16850,16910,12860,12920,10:00:00,10790,10850,119.60,120.10,19340,19420,20700,20800
2026-02-28,16732,16817,13208,13316,15:56:00,11889,11987,106.98,108.03,19765,19875,21739,21904
2026-03-10,16815,16905,13197,13308,20:19:00,11952,12051,106.34,107.41,19574,19686,21666,21838
2026-03-16,16952,17022,13240,13335,21:46:00,11949,12028,106.28,107.22,19463,19552,21478,21624
2026-03-18,16915,17085,13225,13398,07:41:00,12003,12154,106.08,107.65,19504,19710,21514,21778
2026-03-24,16915,17035,13174,13305,07:48:00,11946,12061,105.74,106.88,19316,19490,21464,21669
2026-04-01,16950,17100,13200,13350,09:00:00,12050,12180,105.50,106.70,19400,19600,21500,21750
2026-04-10,16980,17150,13250,13400,14:20:00,12100,12250,105.20,106.40,19450,19680,21580,21850
2026-04-13,17012,17188,13285,13442,16:45:00,12144,12302,104.98,106.12,19512,19745,21640,21922`;

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            return lines.slice(1).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, i) => {
                    obj[header.trim()] = values[i];
                });
                return obj;
            });
        }

        const data = parseCSV(rawData);
        let myChart;

        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID').format(num);
        }

        function updateChart(currency) {
            const labels = data.map(d => {
                const date = new Date(d.date);
                return date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            });
            const buyData = data.map(d => parseFloat(d[`${currency} buy`]));
            const sellData = data.map(d => parseFloat(d[`${currency} sell`]));

            // Update Cards dengan data paling akhir
            const latest = data[data.length - 1];
            document.getElementById('lastBuy').textContent = `Rp ${formatNumber(latest[`${currency} buy` || 0])}`;
            document.getElementById('lastSell').textContent = `Rp ${formatNumber(latest[`${currency} sell` || 0])}`;
            document.getElementById('dataCount').textContent = `${data.length} Entri`;

            const ctx = document.getElementById('kursChart').getContext('2d');
            
            if (myChart) {
                myChart.destroy();
            }

            // Gradien warna untuk kesan premium
            const buyGradient = ctx.createLinearGradient(0, 0, 0, 400);
            buyGradient.addColorStop(0, 'rgba(79, 70, 229, 0.4)');
            buyGradient.addColorStop(1, 'rgba(79, 70, 229, 0)');

            const sellGradient = ctx.createLinearGradient(0, 0, 0, 400);
            sellGradient.addColorStop(0, 'rgba(225, 29, 72, 0.2)');
            sellGradient.addColorStop(1, 'rgba(225, 29, 72, 0)');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: `Beli ${currency.toUpperCase()}`,
                            data: buyData,
                            borderColor: '#4f46e5',
                            backgroundColor: buyGradient,
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#4f46e5',
                            pointBorderWidth: 2
                        },
                        {
                            label: `Jual ${currency.toUpperCase()}`,
                            data: sellData,
                            borderColor: '#e11d48',
                            backgroundColor: sellGradient,
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#e11d48',
                            pointBorderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 25,
                                font: { size: 14, weight: '600' }
                            }
                        },
                        tooltip: {
                            padding: 16,
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#1e293b',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyColor: '#475569',
                            bodyFont: { size: 13 },
                            borderColor: '#e2e8f0',
                            borderWidth: 1,
                            displayColors: true,
                            boxPadding: 6,
                            callbacks: {
                                label: function(context) {
                                    return ` ${context.dataset.label}: Rp ${formatNumber(context.raw)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: '#f1f5f9', drawBorder: false },
                            ticks: {
                                font: { size: 11 },
                                callback: value => 'Rp ' + formatNumber(value)
                            }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        document.getElementById('currencySelect').addEventListener('change', (e) => {
            updateChart(e.target.value);
        });

        window.onload = () => updateChart('usd');
    </script>
</body>
</html>
