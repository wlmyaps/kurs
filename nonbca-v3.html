<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Dokumen Terproteksi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0f172a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .lock-box {
            background: #1e293b;
            border-radius: 28px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        button {
            background: #10b981;
            color: #06291e;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.2s;
        }
        button:hover { background: #059669; }
        .error {
            color: #f87171;
            margin-top: 12px;
            font-size: 14px;
        }
        #toastMsg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            z-index: 99999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>

    function base64ToBytes(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes;
    }

    async function decryptAndShow(password) {
        try {
            const data = base64ToBytes(encryptedB64);
            const salt = data.slice(0, 16);
            const iv = data.slice(16, 28);
            const ciphertext = data.slice(28);

            const saltWA = CryptoJS.lib.WordArray.create(salt);
            const pbkdf2Key = CryptoJS.PBKDF2(password, saltWA, {
                keySize: 8,
                iterations: 8000, // Dioptimasi seimbang dengan kecepatan CPU mobile
                hasher: CryptoJS.algo.SHA256
            });
            const keyRaw = new Uint8Array(32);
            for (let i = 0; i < 32; i++) {
                const wordIdx = i >>> 2;
                const byteShift = 24 - (i % 4) * 8;
                keyRaw[i] = (pbkdf2Key.words[wordIdx] >>> byteShift) & 0xFF;
            }
            const cryptoKey = await crypto.subtle.importKey('raw', keyRaw, { name: 'AES-GCM' }, false, ['decrypt']);
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, cryptoKey, ciphertext);
            const originalHtml = new TextDecoder().decode(decrypted);

            document.open();
            document.write(originalHtml);
            document.close();

            setTimeout(() => {
                // 1. Anti devtool profesional injection
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/disable-devtool@0.3.7/disable-devtool.min.js';
                s.setAttribute('disable-devtool-auto', '');
                s.setAttribute('disable-menu', 'true');
                s.setAttribute('clear-log', 'true');
                s.setAttribute('disable-select', 'true');
                s.setAttribute('disable-copy', 'true');
                document.head.appendChild(s);

                // 2. Blokir manual shortcut kombinasi inspeksi kode
                window.addEventListener('contextmenu', e => e.preventDefault(), true);
                window.addEventListener('keydown', e => {
                    const key = e.key;
                    const ctrl = e.ctrlKey || e.metaKey;
                    const shift = e.shiftKey;
                    if (key === 'F12' ||
                        (ctrl && shift && ['I','J','C'].includes(key.toUpperCase())) ||
                        (ctrl && ['U','S','P'].includes(key.toLowerCase())) ||
                        (key === 'F5' && ctrl)) {
                        e.preventDefault();
                        e.stopPropagation();
                    }
                }, true);

                // 3. ANTI SAVE AS (Override aman dengan penanganan fallback try-catch)
                const originalSerialize = XMLSerializer.prototype.serializeToString;
                XMLSerializer.prototype.serializeToString = function(node) {
                    try {
                        if (node === document || node.nodeType === 9 || (node.nodeName && node.nodeName === 'HTML')) {
                            return '<!DOCTYPE html><html><head><title>Akses Ditolak</title><meta charset="UTF-8"></head><body style="background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh"><h1>🔒 Konten Tidak Dapat Disimpan</h1><p>Dokumen ini dilindungi sistem.</p></body></html>';
                        }
                    } catch(err) {}
                    return originalSerialize.call(this, node);
                };

                // 4. Blokir Ctrl+S menggunakan Notification Toast HTML (Anti-Lag & Responsive)
                window.addEventListener('keydown', function(e) {
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
                        e.preventDefault();
                        e.stopPropagation();
                        const toast = document.getElementById('toastMsg');
                        if(toast) {
                            toast.style.display = 'block';
                            setTimeout(() => { toast.style.display = 'none'; }, 2500);
                        }
                        return false;
                    }
                }, true);
            }, 50);
        } catch(e) {
            document.getElementById('errorMsg').innerText = '❌ Password salah atau file rusak.';
        }
    }

    document.getElementById('unlockBtn').onclick = () => {
        const pwd = document.getElementById('passwordInput').value;
        if (pwd.length < 4) {
            document.getElementById('errorMsg').innerText = 'Password terlalu pendek.';
            return;
        }
        decryptAndShow(pwd);
    };
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('unlockBtn').click();
    });
</script>
